<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pair Spinner Wheels</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a" aria-hidden="true"></div>
    <div class="bg-orb orb-b" aria-hidden="true"></div>
    <div id="particle-layer" class="particle-layer" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="hero">
        <h1>🎡 Vòng quay 8/3 🎀</h1>
        <p>Chọn ra bạn nam để tặng quà bạn nữ ❤️</p>
      </header>

      <section class="controls card" aria-label="wheel controls">
        <button id="spin-btn" class="btn btn-primary" type="button">Quay</button>
        <button id="reset-btn" class="btn btn-secondary" type="button">Reset vòng quay</button>
        <button id="settings-btn" class="btn btn-secondary" type="button" aria-controls="settings-panel" aria-expanded="false">
          ⚙️ Cài đặt
        </button>
      </section>

      <section class="wheels" aria-label="student wheels">
        <article class="wheel-card card" id="male-wheel-card">
          <h2>Bạn nam</h2>
          <div class="wheel-frame">
            <div class="pointer" aria-hidden="true"></div>
            <canvas id="male-wheel" width="440" height="440"></canvas>
          </div>
          <p class="picked-name" id="male-name">—</p>
          <p class="pool-status" id="male-pool-status"></p>
        </article>

        <article class="wheel-card card" id="female-wheel-card">
          <h2>Bạn nữ</h2>
          <div class="wheel-frame">
            <div class="pointer" aria-hidden="true"></div>
            <canvas id="female-wheel" width="440" height="440"></canvas>
          </div>
          <p class="picked-name" id="female-name">—</p>
          <p class="pool-status" id="female-pool-status"></p>
        </article>
      </section>

      <section class="result card" aria-live="polite">
        <h2>Kết quả</h2>
        <p id="pair-result">Quay để chọn cặp tặng quà.</p>
        <p id="pair-meta" class="pair-meta"></p>
        <p id="refill-status" class="refill-status" role="status" aria-live="polite"></p>
        <button id="new-round-btn" class="btn btn-primary" type="button" hidden>Quay</button>
      </section>
    </main>

    <div id="settings-backdrop" class="settings-backdrop" hidden></div>
    <aside id="settings-panel" class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-panel-title" aria-label="app settings" aria-hidden="true" tabindex="-1">
      <div class="settings-header">
        <h2 id="settings-panel-title">Cài đặt</h2>
        <button id="settings-close-btn" class="btn btn-secondary" type="button">Đóng</button>
      </div>

      <section class="setting-group" aria-label="theme settings">
        <h3>Theme</h3>
        <label for="theme-color">Tone màu</label>
        <input id="theme-color" type="color" value="#ff5eaf" aria-label="Select base theme color" />
        <button id="theme-reset-btn" class="btn btn-secondary" type="button">Reset về mặc định</button>
      </section>

      <section class="setting-group" aria-label="spin settings">
        <h3>Quay</h3>
        <label for="spin-duration-range">Thời gian cho mỗi lần quay</label>
        <input id="spin-duration-range" type="range" min="1800" max="6000" step="100" value="3600" />
        <p class="setting-value" id="spin-duration-value">3.6s</p>
      </section>

      <section class="setting-group" aria-label="respin settings">
        <h3>Quay lại</h3>
        <label class="setting-checkbox" for="allow-respin-input">
          <input id="allow-respin-input" type="checkbox" checked />
          Cho phép quay lại 1 lần khi hiện kết quả
        </label>
      </section>

      <section class="setting-group" aria-label="history settings">
        <h3>Lịch sử</h3>
        <label for="history-count-input">Lưu kết quả bao nhiêu cặp</label>
        <input id="history-count-input" type="number" min="1" max="8" step="1" value="3" />
      </section>
    </aside>

    <div id="result-backdrop" class="result-backdrop" hidden></div>
    <aside id="result-popup" class="result-popup" role="dialog" aria-modal="true" aria-labelledby="result-popup-title" aria-hidden="true" hidden>
      <h2 id="result-popup-title">💘 Cặp vừa quay xong!</h2>
      <p id="result-popup-message" class="result-popup-message"></p>
      <p id="result-popup-pair" class="result-popup-pair"></p>
      <div class="result-popup-actions">
        <button id="result-keep-btn" class="btn btn-primary" type="button">Giữ cặp này</button>
        <button id="result-respin-btn" class="btn btn-secondary" type="button">Quay lại 1 lần</button>
      </div>
      <p id="result-popup-hint" class="result-popup-hint"></p>
    </aside>

    <script type="module" src="./app.js"></script>
  </body>
</html>
